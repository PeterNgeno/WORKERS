<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour Management System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#0b1f3a; color:white; padding:10px; }
h1 { text-align:center; }
.container { display:flex; gap:10px; flex-wrap:wrap; }
table { border-collapse: collapse; width:100%; font-size:12px; }
th, td { border:1px solid #ccc; padding:5px; text-align:center; }
.section { margin-top:20px; }
button { padding:6px 10px; margin:2px; }
input, select { padding:5px; }
.card { background:#132c4a; padding:10px; border-radius:10px; }
</style>
</head>

<body>

<h1>Labour Management System</h1>

<div class="section card">
<h3>Add Worker</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="id" placeholder="ID">
<select id="type">
<option>Skilled</option>
<option>Casual</option>
</select>
<input id="rate" placeholder="Rate">
<button onclick="addWorker()">Add</button>
</div>

<div class="container">
<div class="card">
<h3>Skilled Labourers</h3>
<table id="skilledTable"></table>
</div>

<div class="card">
<h3>Casual Labourers</h3>
<table id="casualTable"></table>
</div>
</div>

<div class="section card">
<h3>Dashboard</h3>
<p id="stats"></p>
</div>

<script>
const API = "YOUR_GOOGLE_SCRIPT_URL";
let data = [];

// ================= ATTENDANCE =================
function parseAttendance(v){
 if(!v) return 0;
 v = v.toLowerCase();
 if(v === 'y') return 1;
 if(v === 'n') return 0;
 if(v === 'y/n') return 0.5;
 return 0;
}

// ================= CALCULATIONS =================
function calculate(row){
 const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
 let total = 0;

 days.forEach(d => total += parseAttendance(row[d]));

 row.Days = total;
 row.Earnings = total * row.Rate;
 row.TotalDue = row.Earnings + (row.Arrears || 0);
 row.Balance = row.TotalDue - (row.Paid || 0);
}

// ================= LOAD DATA =================
async function loadData(){
 const res = await fetch(API);
 const json = await res.json();

 const headers = json[0];

 data = json.slice(1).map(r=>{
  let obj = {};
  headers.forEach((h,i)=> obj[h]=r[i]);

  obj.Rate = Number(obj.Rate || 0);
  obj.Paid = Number(obj.Paid || 0);
  obj.Arrears = Number(obj.Arrears || 0);

  calculate(obj);
  return obj;
 });

 render();
}

// ================= RENDER =================
function render(){
 renderTable('Skilled','skilledTable');
 renderTable('Casual','casualTable');
 dashboard();
}

// ================= TABLE =================
function renderTable(type,id){
 let table = document.getElementById(id);
 let rows = data.filter(d=>d.Type===type);

 let html = `
 <tr>
 <th>Name</th>
 <th>Mon</th><th>Tue</th><th>Wed</th>
 <th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
 <th>Days</th><th>Earnings</th><th>Paid</th><th>Balance</th>
 </tr>`;

 rows.forEach(r=>{
  html += `
  <tr>
   <td>${r.Name}</td>

   <td contenteditable onblur="update('${r.Name}','Mon',this.innerText)">${r.Mon||''}</td>
   <td contenteditable onblur="update('${r.Name}','Tue',this.innerText)">${r.Tue||''}</td>
   <td contenteditable onblur="update('${r.Name}','Wed',this.innerText)">${r.Wed||''}</td>
   <td contenteditable onblur="update('${r.Name}','Thu',this.innerText)">${r.Thu||''}</td>
   <td contenteditable onblur="update('${r.Name}','Fri',this.innerText)">${r.Fri||''}</td>
   <td contenteditable onblur="update('${r.Name}','Sat',this.innerText)">${r.Sat||''}</td>
   <td contenteditable onblur="update('${r.Name}','Sun',this.innerText)">${r.Sun||''}</td>

   <td>${r.Days}</td>
   <td>${r.Earnings}</td>

   <td contenteditable onblur="update('${r.Name}','Paid',this.innerText)">
   ${r.Paid}
   </td>

   <td>${r.Balance}</td>
  </tr>`;
 });

 table.innerHTML = html;
}

// ================= UPDATE =================
async function update(name,field,value){
 await fetch(API,{
  method:'POST',
  body: JSON.stringify({type:'update',name,field,value})
 });
 loadData();
}

// ================= ADD WORKER =================
async function addWorker(){
 let row = [
  document.getElementById('name').value,
  document.getElementById('phone').value,
  document.getElementById('id').value,
  document.getElementById('type').value,
  document.getElementById('rate').value,
  new Date().toISOString().slice(0,10)
 ];

 await fetch(API,{
  method:'POST',
  body: JSON.stringify({type:'add',row})
 });

 loadData();
}

// ================= DASHBOARD =================
function dashboard(){
 let totalPaid = data.reduce((s,d)=>s+d.Paid,0);
 let totalBalance = data.reduce((s,d)=>s+d.Balance,0);

 document.getElementById('stats').innerText =
 `Paid: ${totalPaid} | Balance: ${totalBalance}`;
}

// ================= START =================
loadData();
</script>

</body>
</html>
