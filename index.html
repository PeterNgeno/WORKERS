<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour Management System</title>

<style>
body { font-family: Arial; background:#0b1f3a; color:white; padding:20px; }
h1 { text-align:center; }
.section { margin-top:25px; }
table { width:100%; border-collapse: collapse; margin-top:10px; }
th, td { border:1px solid #fff; padding:6px; text-align:center; }
th { background:#1e3a8a; }
input, select { padding:5px; margin:3px; }
button { padding:8px; background:#2563eb; color:white; border:none; cursor:pointer; margin:2px;}
.header-box { background:#1e3a8a; padding:10px; border-radius:10px; }

.admin-only { display:none; }
body.admin .admin-only { display:table-cell; }
</style>
</head>

<body>

<h1>Labour Management System</h1>

<label><input type="checkbox" onchange="toggleAdmin(this.checked)"> Admin View</label>

<div class="section header-box">
<h3>Project</h3>
<input id="venue" placeholder="Venue">
<input id="projectName" placeholder="Project Name">
<input id="startDate" type="date">
<input id="endDate" type="date">
<button onclick="saveProject()">Save</button>
<p id="projectDisplay"></p>
</div>

<div class="section">
<h3>Week Control</h3>
<input id="weekNumber" type="number" placeholder="Week Number">
<button onclick="setWeek()">Set Week</button>
<p id="weekDisplay"></p>
<div id="weekButtons"></div>
</div>

<div class="section">
<h3>Add Worker</h3>
<input id="name" placeholder="Name">
<input id="number" placeholder="Phone" class="admin-only">
<input id="idNumber" placeholder="ID" class="admin-only">
<select id="type">
<option value="Skilled">Skilled</option>
<option value="Casual">Casual</option>
</select>
<input id="rate" placeholder="Rate">
<button onclick="addWorker()">Add</button>
</div>

<div class="section">
<h3>Skilled Labourers</h3>
<table id="skilledTable">
<thead>
<tr>
<th>Name</th><th class="admin-only">Phone</th><th class="admin-only">ID</th>
<th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th>
<th>Week Total</th><th>Arrears</th><th>Total Due</th><th>Paid</th><th>Balance</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="section">
<h3>Casual Labourers</h3>
<table id="casualTable">
<thead>
<tr>
<th>Name</th><th class="admin-only">Phone</th><th class="admin-only">ID</th>
<th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th>
<th>Week Total</th><th>Arrears</th><th>Total Due</th><th>Paid</th><th>Balance</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

const SHEET_API = "https://script.google.com/macros/s/AKfycbyIvyVn0ockKF4jqXEX_xUz7dWF3erWhFu2O5mmnFkD0uaYOrmcpn3gjmkmy8E1rEKYSw/exec";

let workers = [];
let currentWeek = 1;
let maxWeek = 1;
let project = {};

function toggleAdmin(state){
  document.body.classList.toggle("admin", state);
}

function saveProject(){
  project = {
    venue: document.getElementById("venue").value,
    projectName: document.getElementById("projectName").value,
    startDate: document.getElementById("startDate").value,
    endDate: document.getElementById("endDate").value
  };
  document.getElementById("projectDisplay").innerText =
    `${project.projectName || 'N/A'} | ${project.venue || ''}`;
}

function setWeek(){
  currentWeek = parseInt(document.getElementById("weekNumber").value) || 1;

  if(currentWeek > maxWeek) maxWeek = currentWeek;

  document.getElementById("weekDisplay").innerText =
    "Current Week: " + currentWeek;

  generateWeekButtons();
  render();
}

function generateWeekButtons(){
  let container = document.getElementById("weekButtons");
  container.innerHTML = "";

  for(let i=1;i<=maxWeek;i++){
    container.innerHTML += `<button onclick="goToWeek(${i})">Week ${i}</button>`;
  }
}

function goToWeek(w){
  currentWeek = w;
  document.getElementById("weekNumber").value = w;
  document.getElementById("weekDisplay").innerText =
    "Current Week: " + currentWeek;

  render();
}

function addWorker(){
  let workerName = document.getElementById("name").value.trim();

  if(!workerName){
    alert("Enter worker name");
    return;
  }

  let newWorker = {
    name: workerName,
    number: document.getElementById("number").value || "",
    id: document.getElementById("idNumber").value || "",
    type: document.getElementById("type").value,
    rate: parseFloat(document.getElementById("rate").value) || 0,
    weeks: {}
  };

  workers.push(newWorker);

  let wd = getWeekData(newWorker, currentWeek);
  saveToSheet(newWorker, wd);

  document.getElementById("name").value = "";
  document.getElementById("number").value = "";
  document.getElementById("idNumber").value = "";
  document.getElementById("rate").value = "";

  render();
}

function getWeekData(w, week){
  if(!w.weeks[week]){
    w.weeks[week] = {
      days:['','','','','','',''],
      paid:0,
      arrears:0
    };
  }
  return w.weeks[week];
}

function render(){
  document.querySelector('#skilledTable tbody').innerHTML='';
  document.querySelector('#casualTable tbody').innerHTML='';

  workers.forEach((w,i)=>{
    if(!w.name) return;

    let wd = getWeekData(w,currentWeek);
    let total = 0;
    let daysWorked = 0;

    let row = `<tr>
    <td>${w.name}</td>
    <td class='admin-only'>${w.number || ''}</td>
    <td class='admin-only'>${w.id || ''}</td>
    <td>${w.rate || 0}</td>`;

    wd.days.forEach((d,di)=>{
      d = d || "";
      row += `<td><input value="${d}" onchange="updateDay(${i},${di},this.value)"></td>`;

      if(d.toLowerCase()=='y'){ total+=w.rate; daysWorked+=1; }
      if(d.toLowerCase()=='y/n'){ total+=w.rate/2; daysWorked+=0.5; }
    });

    let arrears = wd.arrears || 0;
    let totalDue = total + arrears;
    let balance = totalDue - (wd.paid || 0);

    row += `<td>${daysWorked}</td>
    <td>${total}</td>
    <td>${arrears}</td>
    <td>${totalDue}</td>
    <td><input value="${wd.paid || 0}" onchange="updatePaid(${i},this.value)"></td>
    <td>${balance}</td>
    </tr>`;

    if(w.type=='Skilled'){
      document.querySelector('#skilledTable tbody').innerHTML += row;
    } else {
      document.querySelector('#casualTable tbody').innerHTML += row;
    }
  });
}

function updateDay(i,di,val){
  let w = workers[i];
  let wd = getWeekData(w, currentWeek);

  wd.days[di] = val;

  saveToSheet(w, wd);

  render();
}

function updatePaid(i,val){
  let w = workers[i];
  let wd = getWeekData(w,currentWeek);

  wd.paid = parseFloat(val) || 0;

  calculateArrears(i);
  saveToSheet(w, wd);

  render();
}

function calculateArrears(i){
  let w = workers[i];
  let prevWeek = currentWeek -1;

  if(prevWeek>0 && w.weeks[prevWeek]){
    let prev = w.weeks[prevWeek];
    let prevTotal = 0;

    prev.days.forEach(d=>{
      if((d||"").toLowerCase()=='y') prevTotal+=w.rate;
      if((d||"").toLowerCase()=='y/n') prevTotal+=w.rate/2;
    });

    let prevBalance = (prevTotal + prev.arrears) - prev.paid;
    w.weeks[currentWeek].arrears = prevBalance>0 ? prevBalance : 0;
  }
}

function saveToSheet(worker, weekData){
  fetch(SHEET_API, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      type: "weekly",
      data: {
        project: project.projectName || "",
        venue: project.venue || "",
        name: worker.name || "",
        phone: worker.number || "",
        id: worker.id || "",
        type: worker.type || "",
        rate: worker.rate || 0,
        week: currentWeek,
        days: weekData.days || [],
        arrears: weekData.arrears || 0,
        paid: weekData.paid || 0
      }
    })
  }).catch(err=>{
    console.log("Save error:", err);
  });
}

</script>

</body>
</html>
