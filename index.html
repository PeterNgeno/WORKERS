<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour Management System</title>

<style>
body { font-family: Arial; background:#0b1f3a; color:white; padding:20px; }
h1 { text-align:center; }
.section { margin-top:25px; }
table { width:100%; border-collapse: collapse; margin-top:10px; }
th, td { border:1px solid #fff; padding:6px; text-align:center; }
th { background:#1e3a8a; }
input, select { padding:5px; margin:3px; }
button { padding:8px; background:#2563eb; color:white; border:none; cursor:pointer; margin:2px;}
.header-box { background:#1e3a8a; padding:10px; border-radius:10px; }

.admin-only { display:none; }
body.admin .admin-only { display:table-cell; }
</style>
</head>

<body>

<h1>Labour Management System</h1>

<label><input type="checkbox" onchange="toggleAdmin(this.checked)"> Admin View</label>

<div class="section header-box">
<h3>Project</h3>
<input id="venue" placeholder="Venue">
<input id="projectName" placeholder="Project Name">
<input id="startDate" type="date">
<input id="endDate" type="date">
<button onclick="saveProject()">Save</button>
<p id="projectDisplay"></p>
</div>

<div class="section">
<h3>Week Control</h3>
<input id="weekNumber" type="number" placeholder="Week Number">
<button onclick="setWeek()">Set Week</button>
<p id="weekDisplay"></p>
<div id="weekButtons"></div>
</div>

<div class="section">
<h3>Add Worker</h3>
<input id="name" placeholder="Name">
<input id="number" placeholder="Phone" class="admin-only">
<input id="idNumber" placeholder="ID" class="admin-only">
<select id="type">
<option value="Skilled">Skilled</option>
<option value="Casual">Casual</option>
</select>
<input id="rate" placeholder="Rate">
<button onclick="addWorker()">Add</button>
</div>

<!-- 🔥 EXPORT SECTION -->
<div class="section">
<h3>Export / Share</h3>
<button onclick="exportAll('Skilled')">Export Skilled</button>
<button onclick="exportAll('Casual')">Export Casual</button>
<input id="workerExportName" placeholder="Worker Name">
<button onclick="exportSingle()">Export Single Worker</button>
<input id="exportWeek" placeholder="Week (optional)">
</div>

<div class="section">
<h3>Skilled Labourers</h3>
<table id="skilledTable">
<thead>
<tr>
<th>Name</th><th class="admin-only">Phone</th><th class="admin-only">ID</th>
<th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th>
<th>Week Total</th><th>Arrears</th><th>Total Due</th><th>Paid</th><th>Balance</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="section">
<h3>Casual Labourers</h3>
<table id="casualTable">
<thead>
<tr>
<th>Name</th><th class="admin-only">Phone</th><th class="admin-only">ID</th>
<th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th>
<th>Week Total</th><th>Arrears</th><th>Total Due</th><th>Paid</th><th>Balance</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

const SHEET_API = "https://script.google.com/macros/s/AKfycbyIvyVn0ockKF4jqXEX_xUz7dWF3erWhFu2O5mmnFkD0uaYOrmcpn3gjmkmy8E1rEKYSw/exec";

let workers = [];
let currentWeek = 1;
let maxWeek = 1;
let project = {};

/* ✅ ADMIN */
function toggleAdmin(state){
  document.body.classList.toggle("admin", state);
}

/* ✅ PROJECT */
function saveProject(){
  project = {
    venue: venue.value,
    projectName: projectName.value,
    startDate: startDate.value,
    endDate: endDate.value
  };
  projectDisplay.innerText = `${project.projectName || 'N/A'} | ${project.venue || ''}`;
}

/* ✅ WEEK */
function setWeek(){
  currentWeek = parseInt(weekNumber.value) || 1;
  if(currentWeek > maxWeek) maxWeek = currentWeek;

  weekDisplay.innerText = "Current Week: " + currentWeek;
  generateWeekButtons();
  render();
}

function generateWeekButtons(){
  weekButtons.innerHTML = "";
  for(let i=1;i<=maxWeek;i++){
    weekButtons.innerHTML += `<button onclick="goToWeek(${i})">Week ${i}</button>`;
  }
}

function goToWeek(w){
  currentWeek = w;
  weekNumber.value = w;
  weekDisplay.innerText = "Current Week: " + currentWeek;
  render();
}

/* 🔥 ADD WORKER WITH VALIDATIONS */
function addWorker(){
  let name = document.getElementById("name").value.trim();
  let id = document.getElementById("idNumber").value.trim();

  if(!name){
    alert("Enter name");
    return;
  }

  // ❌ PREVENT DUPLICATE IN SAME WEEK
  let exists = workers.find(w => w.name === name && w.weeks[currentWeek]);
  if(exists){
    alert("Worker already exists in this week");
    return;
  }

  // 🆔 ID VALIDATION (must start with same first letter as name)
  if(id && id[0].toLowerCase() !== name[0].toLowerCase()){
    alert("ID must start with same initial as name");
    return;
  }

  let w = {
    name,
    number: number.value || "",
    id,
    type: type.value,
    rate: parseFloat(rate.value) || 0,
    weeks: {}
  };

  workers.push(w);

  let wd = getWeekData(w, currentWeek);
  saveToSheet(w, wd);

  name.value = "";
  number.value = "";
  idNumber.value = "";
  rate.value = "";

  render();
}

/* EXISTING LOGIC UNTOUCHED BELOW */

function getWeekData(w, week){
  if(!w.weeks[week]){
    w.weeks[week] = { days:['','','','','','',''], paid:0, arrears:0 };
  }
  return w.weeks[week];
}

function render(){
  skilledTable.querySelector('tbody').innerHTML='';
  casualTable.querySelector('tbody').innerHTML='';

  workers.forEach((w,i)=>{
    if(!w.name) return;

    let wd = getWeekData(w,currentWeek);
    let total = 0;
    let daysWorked = 0;

    let row = `<tr>
    <td>${w.name}</td>
    <td class='admin-only'>${w.number || ''}</td>
    <td class='admin-only'>${w.id || ''}</td>
    <td>${w.rate}</td>`;

    wd.days.forEach((d,di)=>{
      d = d || "";
      row += `<td><input value="${d}" onchange="updateDay(${i},${di},this.value)"></td>`;
      if(d.toLowerCase()=='y'){ total+=w.rate; daysWorked+=1; }
      if(d.toLowerCase()=='y/n'){ total+=w.rate/2; daysWorked+=0.5; }
    });

    let arrears = wd.arrears || 0;
    let totalDue = total + arrears;
    let balance = totalDue - (wd.paid || 0);

    row += `<td>${daysWorked}</td><td>${total}</td><td>${arrears}</td>
    <td>${totalDue}</td><td><input value="${wd.paid||0}" onchange="updatePaid(${i},this.value)"></td>
    <td>${balance}</td></tr>`;

    if(w.type=='Skilled') skilledTable.querySelector('tbody').innerHTML+=row;
    else casualTable.querySelector('tbody').innerHTML+=row;
  });
}

function updateDay(i,di,val){
  let w = workers[i];
  let wd = getWeekData(w,currentWeek);
  wd.days[di]=val;
  saveToSheet(w, wd);
  render();
}

function updatePaid(i,val){
  let w = workers[i];
  let wd = getWeekData(w,currentWeek);
  wd.paid=parseFloat(val)||0;
  calculateArrears(i);
  saveToSheet(w, wd);
  render();
}

function calculateArrears(i){
  let w = workers[i];
  let prevWeek = currentWeek-1;
  if(prevWeek>0 && w.weeks[prevWeek]){
    let prev = w.weeks[prevWeek];
    let prevTotal = 0;
    prev.days.forEach(d=>{
      if((d||"").toLowerCase()=='y') prevTotal+=w.rate;
      if((d||"").toLowerCase()=='y/n') prevTotal+=w.rate/2;
    });
    let prevBalance = (prevTotal+prev.arrears)-prev.paid;
    w.weeks[currentWeek].arrears = prevBalance>0?prevBalance:0;
  }
}

/* 🔥 EXPORT FUNCTIONS */
function exportAll(type){
  let text = "Labour Report\n\n";
  workers.filter(w=>w.type===type).forEach(w=>{
    text += formatWorker(w);
  });
  download(text, type+"_report.txt");
}

function exportSingle(){
  let name = workerExportName.value.trim();
  let week = exportWeek.value;

  let w = workers.find(x=>x.name===name);
  if(!w){ alert("Worker not found"); return; }

  let text = formatWorker(w, week);
  download(text, name+"_report.txt");
}

function formatWorker(w, week=null){
  let text = `Name: ${w.name}\n`;

  Object.keys(w.weeks).forEach(wk=>{
    if(week && wk!=week) return;

    let d = w.weeks[wk];
    text += `Week ${wk} | Paid: ${d.paid} | Arrears: ${d.arrears}\n`;
  });

  text += "\n";
  return text;
}

function download(content, filename){
  let blob = new Blob([content], {type:"text/plain"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

/* SAVE */
function saveToSheet(worker, weekData){
  fetch(SHEET_API,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      type:"weekly",
      data:{
        name:worker.name,
        phone:worker.number,
        id:worker.id,
        type:worker.type,
        rate:worker.rate,
        week:currentWeek,
        days:weekData.days,
        arrears:weekData.arrears,
        paid:weekData.paid
      }
    })
  });
}

</script>

</body>
</html>
