<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour Management System</title>

<style>
body { font-family: Arial; background:#0b1f3a; color:white; padding:20px; }
h1 { text-align:center; }
.section { margin-top:25px; }
table { width:100%; border-collapse: collapse; margin-top:10px; }
th, td { border:1px solid #fff; padding:6px; text-align:center; }
th { background:#1e3a8a; }
input, select { padding:5px; margin:3px; }
button { padding:8px; background:#2563eb; color:white; border:none; cursor:pointer; margin:2px;}
.header-box { background:#1e3a8a; padding:10px; border-radius:10px; }

.admin-only { display:none; }
body.admin .admin-only { display:table-cell; }

body:not(.admin) input,
body:not(.admin) select,
body:not(.admin) button {
  display:none;
}
</style>
</head>

<body>

<h1>Labour Management System</h1>

<label><input type="checkbox" onchange="toggleAdmin(this.checked)"> Admin View</label>

<div class="section header-box">
<h3>Project</h3>
<input id="venue" placeholder="Venue">
<input id="projectName" placeholder="Project Name">
<input id="startDate" type="date">
<input id="endDate" type="date">
<button onclick="saveProject()">Save</button>
<p id="projectDisplay"></p>
</div>

<div class="section">
<h3>Week Control</h3>
<input id="weekNumber" type="number" placeholder="Week Number">
<button onclick="setWeek()">Set Week</button>
<p id="weekDisplay"></p>
<div id="weekButtons"></div>
</div>

<div class="section">
<h3>Add Worker</h3>
<input id="name" placeholder="Name">
<input id="number" placeholder="Phone">
<input id="idNumber" placeholder="ID Number">
<select id="type">
<option value="Skilled">Skilled</option>
<option value="Casual">Casual</option>
</select>
<input id="rate" placeholder="Rate">
<button onclick="addWorker()">Add</button>
</div>

<div class="section">
<h3>Summary</h3>
<p id="summary"></p>
</div>

<div class="section">
<h3>Skilled Labourers</h3>
<table id="skilledTable"><thead>
<tr>
<th>Name</th><th class="admin-only">Phone</th><th class="admin-only">ID</th>
<th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th>
<th>Week Total</th><th>Arrears</th><th>Total Due</th><th>Paid</th><th>Balance</th>
<th class="admin-only">Delete</th>
</tr>
</thead><tbody></tbody></table>
</div>

<div class="section">
<h3>Casual Labourers</h3>
<table id="casualTable"><thead>
<tr>
<th>Name</th><th class="admin-only">Phone</th><th class="admin-only">ID</th>
<th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th>
<th>Week Total</th>
<th>Arrears</th><th>Total Due</th><th>Paid</th><th>Balance</th>
<th class="admin-only">Delete</th>
</tr>
</thead><tbody></tbody></table>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz36Y0_khbscaxVNK3IgWjQ4aGZ911FkW3xbJfs0_IkSFtImJ0bPHrsj9b6bm3q579lUQ/exec";

let workers = [];
let currentWeek = 1;
let isAdmin = false;

function formatMoney(n){ return "Ksh " + (n||0).toLocaleString(); }

function toggleAdmin(s){
  if(s){
    let p = prompt("Password:");
    if(p==="@Adminpage1234"){ document.body.classList.add("admin"); isAdmin=true;}
    else alert("Wrong");
  } else { document.body.classList.remove("admin"); isAdmin=false; }
  render();
}

/* LOAD */
async function loadFromSheet(){
  let res = await fetch(API_URL);
  let data = await res.json();

  workers=[];

  data.forEach(r=>{
    let w = workers.find(x=>x.name===r.Name);
    if(!w){
      w={name:r.Name,number:r.Phone,id:r.ID,type:r.Type,rate:+r.Rate,weeks:{}};
      workers.push(w);
    }

    w.weeks[r.Week]={days:r.Days?.split(",")||['','','','','','',''],paid:+r.Paid||0,arrears:+r.Arrears||0};
  });

  render();
}
window.onload=loadFromSheet;

/* SAVE */
async function saveToSheet(w,wd){
  await fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      action:"update",
      name:w.name, phone:w.number, id:w.id,
      type:w.type, rate:w.rate,
      week:Number(currentWeek),
      days:wd.days.join(","),
      paid:wd.paid,
      arrears:wd.arrears
    })
  });

  setTimeout(loadFromSheet,700);
}

/* DELETE */
async function deleteWorker(name){
  if(!confirm("Delete "+name+"?")) return;

  await fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({action:"delete",name})
  });

  setTimeout(loadFromSheet,700);
}

function getWeekData(w,week){
  if(!w.weeks[week]){
    let prev = w.weeks[week-1];
    let arrears = prev ? (prev.totalDue - prev.paid) || 0 : 0;
    w.weeks[week]={days:['','','','','','',''],paid:0,arrears};
  }
  return w.weeks[week];
}

function addWorker(){
  let name=nameInput.value.trim();
  if(!name) return alert("Name needed");

  let w=workers.find(x=>x.name===name)||{
    name,number:number.value,id:idNumber.value,
    type:type.value,rate:+rate.value,weeks:{}};

  if(!workers.includes(w)) workers.push(w);

  let wd=getWeekData(w,currentWeek);
  saveToSheet(w,wd);
}

/* RENDER */
function render(){
  let totalPaid=0,totalDue=0;

  skilledTable.querySelector("tbody").innerHTML="";
  casualTable.querySelector("tbody").innerHTML="";

  workers.forEach((w,i)=>{
    let wd=getWeekData(w,currentWeek);
    let total=0,days=0;

    let row=`<tr><td>${w.name}</td>
    <td class='admin-only'>${w.number}</td>
    <td class='admin-only'>${w.id}</td>
    <td>${formatMoney(w.rate)}</td>`;

    wd.days.forEach((d,di)=>{
      row+= isAdmin
      ? `<td><input value="${d||''}" onchange="updateDay(${i},${di},this.value)"></td>`
      : `<td>${d||''}</td>`;

      if(d=='y'){ total+=w.rate; days++; }
      if(d=='y/n'){ total+=w.rate/2; days+=0.5; }
    });

    let arrears=wd.arrears||0;
    let totalDueW=total+arrears;
    wd.totalDue=totalDueW;

    totalDue+=totalDueW;
    totalPaid+=wd.paid;

    let balance=totalDueW-wd.paid;

    row+=`<td>${days}</td>
    <td>${formatMoney(total)}</td>
    <td>${formatMoney(arrears)}</td>
    <td>${formatMoney(totalDueW)}</td>
    <td>${isAdmin?`<input value="${wd.paid}" onchange="updatePaid(${i},this.value)">`:formatMoney(wd.paid)}</td>
    <td>${formatMoney(balance)}</td>
    <td class='admin-only'><button onclick="deleteWorker('${w.name}')">X</button></td>
    </tr>`;

    (w.type==="Skilled"?skilledTable:casualTable).querySelector("tbody").innerHTML+=row;
  });

  document.getElementById("summary").innerText =
    "Total Due: "+formatMoney(totalDue)+" | Paid: "+formatMoney(totalPaid)+" | Balance: "+formatMoney(totalDue-totalPaid);
}

function updateDay(i,di,val){
  let wd=getWeekData(workers[i],currentWeek);
  wd.days[di]=val;
  saveToSheet(workers[i],wd);
}

function updatePaid(i,val){
  let wd=getWeekData(workers[i],currentWeek);
  wd.paid=+val||0;
  saveToSheet(workers[i],wd);
}
</script>
</body>
</html>
