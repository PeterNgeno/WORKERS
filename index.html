<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour Management System</title>

<style>
body { font-family: Arial; background:#0b1f3a; color:white; padding:20px; }
h1 { text-align:center; }
.section { margin-top:25px; }
table { width:100%; border-collapse: collapse; margin-top:10px; }
th, td { border:1px solid #fff; padding:6px; text-align:center; }
th { background:#1e3a8a; }
input, select { padding:5px; margin:3px; }
button { padding:8px; background:#2563eb; color:white; border:none; cursor:pointer; margin:2px;}
.header-box { background:#1e3a8a; padding:10px; border-radius:10px; }

.admin-only { display:none; }
body.admin .admin-only { display:table-cell; }
</style>
</head>

<body>

<h1>Labour Management System</h1>

<label><input type="checkbox" onchange="toggleAdmin(this.checked)"> Admin View</label>

<div class="section header-box">
<h3>Project</h3>
<input id="venue" placeholder="Venue">
<input id="projectName" placeholder="Project Name">
<input id="startDate" type="date">
<input id="endDate" type="date">
<button onclick="saveProject()">Save</button>
<p id="projectDisplay"></p>
</div>

<div class="section">
<h3>Week Control</h3>
<input id="weekNumber" type="number" placeholder="Week Number">
<button onclick="setWeek()">Set Week</button>
<p id="weekDisplay"></p>
<div id="weekButtons"></div>
</div>

<div class="section">
<h3>Add Worker</h3>
<input id="name" placeholder="Name">
<input id="number" placeholder="Phone">
<input id="idNumber" placeholder="ID Number">
<select id="type">
<option value="Skilled">Skilled</option>
<option value="Casual">Casual</option>
</select>
<input id="rate" placeholder="Rate">
<button onclick="addWorker()">Add</button>
</div>

<div class="section">
<h3>Export / Share</h3>
<button onclick="exportAll('Skilled')">Export Skilled PDF</button>
<button onclick="exportAll('Casual')">Export Casual PDF</button>
<input id="workerExportName" placeholder="Worker Name">
<input id="exportWeek" placeholder="Week (optional)">
<button onclick="exportSingle()">Export Single PDF</button>
</div>

<div class="section">
<h3>Skilled Labourers</h3>
<table id="skilledTable"><thead>
<tr>
<th>Name</th><th class="admin-only">Phone</th><th class="admin-only">ID</th>
<th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th>
<th>Week Total</th><th>Arrears</th><th>Total Due</th><th>Paid</th><th>Balance</th>
</tr>
</thead><tbody></tbody></table>
</div>

<div class="section">
<h3>Casual Labourers</h3>
<table id="casualTable"><thead>
<tr>
<th>Name</th><th class="admin-only">Phone</th><th class="admin-only">ID</th>
<th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th>
<th>Week Total</th>
<th>Arrears</th><th>Total Due</th><th>Paid</th><th>Balance</th>
</tr>
</thead><tbody></tbody></table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const { jsPDF } = window.jspdf;

/* ✅ NEW CORRECT API */
const API_URL = "https://script.google.com/macros/s/AKfycbxGw9veDKcg4yVIvUzF4DfKspUbpX10bJ2I6OeitWL6TSYL9QRqJu5iNCoutcE0dc-9/exec";

let workers = [];
let currentWeek = 1;
let maxWeek = 1;
let isAdmin = false;

function formatMoney(num){
  return "Ksh " + Number(num || 0).toLocaleString();
}

/* ADMIN */
function toggleAdmin(state){
  if(state){
    let pass = prompt("Enter Admin Password:");
    if(pass === "@Adminpage1234"){
      document.body.classList.add("admin");
      isAdmin = true;
    } else {
      alert("Wrong password");
      document.querySelector("input[type=checkbox]").checked=false;
    }
  } else {
    document.body.classList.remove("admin");
    isAdmin = false;
  }

  render();
}

/* LOAD */
async function loadFromSheet(){
  try{
    let res = await fetch(API_URL);
    let data = await res.json();

    workers = [];

    data.forEach(row=>{
      let existing = workers.find(x=>x.name===row.Name);

      if(!existing){
        existing = {
          name: row.Name,
          number: row.Phone,
          id: row.ID,
          type: row.Type,
          rate: parseFloat(row.Rate),
          weeks:{}
        };
        workers.push(existing);
      }

      existing.weeks[row.Week] = {
        days: row.Days ? row.Days.split(",") : ['','','','','','',''],
        paid: parseFloat(row.Paid)||0,
        arrears: parseFloat(row.Arrears)||0
      };

      if(row.Week > maxWeek) maxWeek = row.Week;
    });

    generateWeekButtons();
    render();

  }catch(e){
    console.error("LOAD ERROR:", e);
    alert("Failed to load data. Check script deployment.");
  }
}

window.onload = loadFromSheet;

/* SAVE */
async function saveToSheet(worker, wd){
  await fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      action:"update",
      name: worker.name,
      phone: worker.number,
      id: worker.id,
      type: worker.type,
      rate: worker.rate,
      week: currentWeek,
      days: wd.days.join(","),
      paid: wd.paid,
      arrears: wd.arrears
    })
  });

  setTimeout(loadFromSheet,500);
}

/* ADD WORKER */
function addWorker(){
  let name = document.getElementById("name").value.trim();
  let id = document.getElementById("idNumber").value.trim();
  let phone = document.getElementById("number").value.trim() || "unknown";

  if(!name){ alert("Enter name"); return; }

  let existingWorker = workers.find(w=>w.name===name);

  if(existingWorker){
    if(existingWorker.id && id && existingWorker.id !== id){
      alert("ID must match first ID");
      return;
    }
  }

  let w = existingWorker || {
    name,
    number: phone,
    id,
    type:type.value,
    rate:parseFloat(rate.value)||0,
    weeks:{}
  };

  if(!existingWorker) workers.push(w);

  let wd = getWeekData(w,currentWeek);
  saveToSheet(w, wd);

  render();
}

function getWeekData(w,week){
  if(!w.weeks[week]){
    w.weeks[week]={days:['','','','','','',''],paid:0,arrears:0};
  }
  return w.weeks[week];
}

/* RENDER */
function render(){
  skilledTable.querySelector('tbody').innerHTML='';
  casualTable.querySelector('tbody').innerHTML='';

  workers.forEach((w,i)=>{
    let wd=getWeekData(w,currentWeek);
    let total=0, daysWorked=0;

    let row=`<tr>
    <td>${w.name}</td>
    <td class='admin-only'>${w.number}</td>
    <td class='admin-only'>${w.id}</td>
    <td>${formatMoney(w.rate)}</td>`;

    wd.days.forEach((d,di)=>{
      let disabled = isAdmin ? "" : "disabled";

      row+=`<td><input ${disabled} value="${d||''}" onchange="updateDay(${i},${di},this.value)"></td>`;

      let val=(d||'').toLowerCase();

      if(val=='y'){ total+=w.rate; daysWorked++; }
      else if(val=='y/n'){ total+=w.rate/2; daysWorked+=0.5; }
    });

    let arrears=wd.arrears||0;
    let totalDue=total+arrears;
    let balance=totalDue-wd.paid;

    let paidInput = isAdmin 
      ? `<input value="${wd.paid||0}" onchange="updatePaid(${i},this.value)">`
      : formatMoney(wd.paid);

    row+=`
    <td>${daysWorked}</td>
    <td>${formatMoney(total)}</td>
    <td>${formatMoney(arrears)}</td>
    <td>${formatMoney(totalDue)}</td>
    <td>${paidInput}</td>
    <td>${formatMoney(balance)}</td>
    </tr>`;

    if(w.type=='Skilled') skilledTable.querySelector('tbody').innerHTML+=row;
    else casualTable.querySelector('tbody').innerHTML+=row;
  });
}

function updateDay(i,di,val){
  if(!isAdmin) return;
  let wd=getWeekData(workers[i],currentWeek);
  wd.days[di]=val;
  saveToSheet(workers[i], wd);
}

function updatePaid(i,val){
  if(!isAdmin) return;
  let wd=getWeekData(workers[i],currentWeek);
  wd.paid=parseFloat(val)||0;
  saveToSheet(workers[i], wd);
}

</script>
</body>
</html>
