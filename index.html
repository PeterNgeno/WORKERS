<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour Management System</title>

<style>
body { font-family: Arial; background:#0b1f3a; color:white; padding:20px; }
h1 { text-align:center; }
.section { margin-top:25px; }
table { width:100%; border-collapse: collapse; margin-top:10px; }
th, td { border:1px solid #fff; padding:6px; text-align:center; }
th { background:#1e3a8a; }
input, select { padding:5px; margin:3px; }
button { padding:8px; background:#2563eb; color:white; border:none; cursor:pointer; margin:2px;}
.header-box { background:#1e3a8a; padding:10px; border-radius:10px; }

.admin-only { display:none; }
body.admin .admin-only { display:table-cell; }
</style>
</head>

<body>

<h1>Labour Management System</h1>

<label><input type="checkbox" onchange="toggleAdmin(this.checked)"> Admin View</label>

<div class="section header-box">
<h3>Project</h3>
<input id="venue" placeholder="Venue">
<input id="projectName" placeholder="Project Name">
<input id="startDate" type="date">
<input id="endDate" type="date">
<button onclick="saveProject()">Save</button>
<p id="projectDisplay"></p>
</div>

<div class="section">
<h3>Week Control</h3>
<input id="weekNumber" type="number" placeholder="Week Number">
<button onclick="setWeek()">Set Week</button>
<p id="weekDisplay"></p>
<div id="weekButtons"></div>
</div>

<div class="section">
<h3>Add Worker</h3>
<input id="name" placeholder="Name">
<input id="number" placeholder="Phone" class="admin-only">
<input id="idNumber" placeholder="ID" class="admin-only">
<select id="type">
<option value="Skilled">Skilled</option>
<option value="Casual">Casual</option>
</select>
<input id="rate" placeholder="Rate">
<button onclick="addWorker()">Add</button>
</div>

<div class="section">
<h3>Export / Share</h3>
<button onclick="exportAll('Skilled')">Export Skilled PDF</button>
<button onclick="exportAll('Casual')">Export Casual PDF</button>
<input id="workerExportName" placeholder="Worker Name">
<input id="exportWeek" placeholder="Week (optional)">
<button onclick="exportSingle()">Export Single PDF</button>
</div>

<div class="section">
<h3>Skilled Labourers</h3>
<table id="skilledTable"><thead>
<tr>
<th>Name</th><th class="admin-only">Phone</th><th class="admin-only">ID</th>
<th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th>
<th>Week Total</th><th>Arrears</th><th>Total Due</th><th>Paid</th><th>Balance</th>
</tr>
</thead><tbody></tbody></table>
</div>

<div class="section">
<h3>Casual Labourers</h3>
<table id="casualTable"><thead>
<tr>
<th>Name</th><th class="admin-only">Phone</th><th class="admin-only">ID</th>
<th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th>
<th>Week Total</th><th>Arrears</th><th>Total Due</th><th>Paid</th><th>Balance</th>
</tr>
</thead><tbody></tbody></table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const { jsPDF } = window.jspdf;

let workers = [];
let currentWeek = 1;
let maxWeek = 1;

function formatMoney(num){
  return "Ksh " + Number(num || 0).toLocaleString();
}

function toggleAdmin(state){
  document.body.classList.toggle("admin", state);
}

function saveProject(){
  let v = venue.value;
  let p = projectName.value;
  projectDisplay.innerText = "Venue: " + v + " | Project: " + p;
}

function setWeek(){
  currentWeek = parseInt(weekNumber.value) || 1;
  if(currentWeek > maxWeek) maxWeek = currentWeek;
  weekDisplay.innerText = "Current Week: " + currentWeek;
  generateWeekButtons();
  render();
}

function generateWeekButtons(){
  weekButtons.innerHTML="";
  for(let i=1;i<=maxWeek;i++){
    weekButtons.innerHTML += `<button onclick="goToWeek(${i})">Week ${i}</button>`;
  }
}

function goToWeek(w){
  currentWeek=w;
  weekNumber.value=w;
  weekDisplay.innerText="Current Week: "+w;
  render();
}

function addWorker(){
  let name = document.getElementById("name").value.trim();
  let id = document.getElementById("idNumber").value.trim();

  if(!name){ alert("Enter name"); return; }

  if(id && id[0].toLowerCase() !== name[0].toLowerCase()){
    alert("ID must match name initial");
    return;
  }

  let exists = workers.find(w=>w.name===name && w.weeks[currentWeek]);
  if(exists){ alert("Already exists this week"); return; }

  let w = {
    name,
    number:number.value||"",
    id,
    type:type.value,
    rate:parseFloat(rate.value)||0,
    weeks:{}
  };

  workers.push(w);
  render();
}

function getWeekData(w,week){
  if(!w.weeks[week]){
    w.weeks[week]={days:['','','','','','',''],paid:0,arrears:0};
  }
  return w.weeks[week];
}

/* 🔥 RESTORED RENDER FUNCTION */
function render(){
  skilledTable.querySelector('tbody').innerHTML='';
  casualTable.querySelector('tbody').innerHTML='';

  workers.forEach((w,i)=>{
    let wd=getWeekData(w,currentWeek);

    let row=`<tr>
    <td>${w.name}</td>
    <td class='admin-only'>${w.number}</td>
    <td class='admin-only'>${w.id}</td>
    <td>${formatMoney(w.rate)}</td>
    <td colspan="13">Worker Added</td>
    </tr>`;

    if(w.type=='Skilled') skilledTable.querySelector('tbody').innerHTML+=row;
    else casualTable.querySelector('tbody').innerHTML+=row;
  });
}

/* HEADER + EXPORT (UNCHANGED) */

function drawHeader(doc, title){
  let v = venue.value || "";
  let p = projectName.value || "";

  doc.setFillColor(30,58,138);
  doc.rect(0,0,210,20,'F');

  doc.setTextColor(255,255,255);
  doc.setFontSize(14);
  doc.text(title,10,12);

  doc.setFontSize(10);
  doc.text(`Venue: ${v} | Project: ${p}`,10,17);

  doc.setTextColor(0,0,0);
}

function getWeekBalance(w, week){
  let wd = w.weeks[week];
  if(!wd) return 0;

  let total = 0;

  wd.days.forEach(d=>{
    if((d||'').toLowerCase()=='y') total+=w.rate;
    if((d||'').toLowerCase()=='y/n') total+=w.rate/2;
  });

  return total - (wd.paid || 0);
}

function exportAll(type){
  let doc=new jsPDF();
  drawHeader(doc, type+" Labour Report");

  let y=30;

  workers.filter(w=>w.type===type).forEach(w=>{
    doc.text("Name: "+w.name,10,y); y+=6;

    Object.keys(w.weeks).forEach(week=>{
      let d=w.weeks[week];
      let balance = getWeekBalance(w, week);

      doc.text(
        `Week ${week} | Paid: ${formatMoney(d.paid)} | Balance: ${formatMoney(balance)}`,
        10,y
      );
      y+=6;
    });

    y+=4;
  });

  doc.save(type+"_report.pdf");
}

function exportSingle(){
  let name=workerExportName.value.trim();
  let w=workers.find(x=>x.name===name);
  if(!w){ alert("Not found"); return; }

  let doc=new jsPDF();
  drawHeader(doc, "Worker Report");

  let y=30;

  doc.text("Name: "+w.name,10,y); y+=10;

  Object.keys(w.weeks).forEach(week=>{
    let d=w.weeks[week];
    let balance = getWeekBalance(w, week);

    doc.text(
      `Week ${week} | Paid: ${formatMoney(d.paid)} | Balance: ${formatMoney(balance)}`,
      10,y
    );
    y+=8;
  });

  doc.save(name+".pdf");
}

</script>
</body>
</html>
