<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour Management System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#0b1f3a; color:white; padding:15px; }
h1 { text-align:center; }
.section { margin-top:20px; }

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
  font-size:12px;
}

th, td {
  border:1px solid #fff;
  padding:5px;
  text-align:center;
}

th { background:#1e3a8a; }

input, select {
  padding:5px;
  margin:3px;
  width:110px;
}

button {
  padding:6px;
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
  margin:2px;
}

.day-btn{
  padding:3px 6px;
  margin:1px;
  font-size:10px;
  background:#0ea5e9;
}

.header-box {
  background:#1e3a8a;
  padding:10px;
  border-radius:10px;
}

.admin-only { display:none; }
body.admin .admin-only { display:table-cell; }
</style>
</head>

<body>

<h1>Labour Management System</h1>

<label>
<input type="checkbox" onchange="toggleAdmin(this.checked)">
 Admin View
</label>

<!-- PROJECT HEADER -->
<div class="section header-box">
<h3>Project Details</h3>

<input id="companyTitle" placeholder="Company Title (Auto: CONSTRUCTIONS)">
<input id="venue" placeholder="Venue">
<input id="projectTitle" placeholder="Project Title">
<input id="startDate" type="date">
<input id="endDate" type="date">

</div>

<div class="section header-box">
<h3>Week Control</h3>
<input id="weekNumber" type="number" placeholder="Week (1,2,3...)">
<button onclick="setWeek()">Set Week</button>
<button onclick="generatePDF()">Download Week PDF</button>
<p id="weekDisplay"></p>
</div>

<div class="section">
<h3>Add Worker</h3>

<input id="nameInput" placeholder="Name">
<input id="number" placeholder="Phone">
<input id="idNumber" placeholder="ID">

<select id="type">
<option value="Skilled">Skilled</option>
<option value="Casual">Casual</option>
</select>

<input id="rate" placeholder="Rate">

<button onclick="addWorker()">Add Worker</button>
</div>

<div class="section">
<h3>Summary</h3>
<p id="summary"></p>
</div>

<div class="section">
<h3>Skilled Labourers</h3>
<table id="skilledTable"><thead><tr>
<th>Name</th><th>Phone</th><th>ID</th><th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th><th>Total</th><th>Arrears</th><th>Total Due</th>
<th>Paid</th><th>Date</th><th>Balance</th>
<th class="admin-only">Delete</th>
</tr></thead><tbody></tbody></table>
</div>

<div class="section">
<h3>Casual Labourers</h3>
<table id="casualTable"><thead><tr>
<th>Name</th><th>Phone</th><th>ID</th><th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th><th>Total</th><th>Arrears</th><th>Total Due</th>
<th>Paid</th><th>Date</th><th>Balance</th>
<th class="admin-only">Delete</th>
</tr></thead><tbody></tbody></table>
</div>

<script>

// 🔥 AUTO DEFAULT TITLE
document.getElementById("companyTitle").value = "CONSTRUCTIONS";

const API_URL = "https://script.google.com/macros/s/AKfycbwesKptkPVHeFgW1uLPjHkf02o2JIkmTBfq1iBx3mFMXlp13_nOp046olQIScujDBdx/exec";

let workers = [];
let currentWeek = 1;
let isAdmin = false;

function formatMoney(n){
  return "Ksh " + (n || 0).toLocaleString();
}

function normalize(d){
  if(!d) return "";
  d = d.toLowerCase().trim();
  if(d === "y") return "y";
  if(d === "n") return "n";
  if(d === "y/n") return "y/n";
  return "";
}

/* DAY BUTTON CLICK */
function setDay(i, di, val){
  let wd = getWeekData(workers[i], currentWeek);
  wd.days[di] = val;
  save(workers[i], wd);
}

/* ADMIN */
function toggleAdmin(s){
  if(s){
    let p = prompt("Password:");
    if(p === "@Adminpage1234"){
      document.body.classList.add("admin");
      isAdmin = true;
    } else {
      alert("Wrong password");
      document.querySelector("input[type=checkbox]").checked = false;
    }
  } else {
    document.body.classList.remove("admin");
    isAdmin = false;
  }
  render();
}

/* WEEK */
function setWeek(){
  let w = +weekNumber.value;
  if(!w) return alert("Enter valid week");
  currentWeek = w;
  weekDisplay.innerText = "Current Week: " + w;
  render();
}

function calculateTotal(w, wd){
  let total = 0;
  wd.days.forEach(d=>{
    d = normalize(d);
    if(d==="y") total += w.rate;
    if(d==="y/n") total += w.rate/2;
  });
  return total;
}

/* LOAD (UNCHANGED) */
async function load(){
  let res = await fetch(API_URL);
  let data = await res.json();

  workers = [];

  data.forEach(r=>{
    let w = workers.find(x=>x.name===r.Name);

    if(!w){
      w = {name:r.Name, number:r.Phone||"", id:r.ID||"", type:r.Type||"", rate:+r.Rate||0, weeks:{}};
      workers.push(w);
    }

    w.weeks[r.Week] = {
      days:(r.Days||"").split(","),
      paid:+r.Paid||0,
      arrears:+r.Arrears||0,
      date:r.Date||""
    };
  });

  render();
}
window.onload = load;

/* SAVE (UNCHANGED) */
async function save(w, wd){
  await fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"update",
      name:w.name,
      phone:w.number,
      id:w.id,
      type:w.type,
      rate:w.rate,
      week:currentWeek,
      days:wd.days.join(","),
      paid:wd.paid,
      arrears:wd.arrears,
      date:wd.date||new Date().toISOString().split("T")[0]
    })
  });

  setTimeout(load,500);
}

/* DELETE */
async function deleteWorker(name){
  if(!confirm("Delete "+name+"?")) return;

  await fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"delete",name})
  });

  setTimeout(load,500);
}

/* WEEK DATA (UNCHANGED) */
function getWeekData(w, week){
  if(!w.weeks[week]){
    let prev = w.weeks[week-1];
    let carry = 0;
    if(prev){
      let totalPrev = calculateTotal(w, prev);
      carry = (totalPrev + prev.arrears) - prev.paid;
    }
    w.weeks[week] = {
      days:["","","","","","",""],
      paid:0,
      arrears:carry,
      date:""
    };
  }
  return w.weeks[week];
}

/* ADD WORKER (UNCHANGED) */
function addWorker(){
  let name = nameInput.value.trim();
  if(!name) return alert("Name required");

  let exists = workers.find(w=>w.name.toLowerCase()===name.toLowerCase());
  if(exists) return alert("Worker already exists");

  let w={name,number:number.value,id:idNumber.value,type:type.value,rate:+rate.value,weeks:{}};
  workers.push(w);
  save(w,getWeekData(w,currentWeek));
}

/* RENDER (ONLY DAY INPUT CHANGED TO BUTTONS) */
function render(){

  skilledTable.querySelector("tbody").innerHTML="";
  casualTable.querySelector("tbody").innerHTML="";

  workers.forEach((w,i)=>{

    let wd = getWeekData(w,currentWeek);
    let total = calculateTotal(w,wd);
    let totalDue = total + wd.arrears;
    let balance = totalDue - wd.paid;

    let row=`<tr>
<td>${w.name}</td>
<td>${w.number}</td>
<td>${w.id}</td>
<td>${w.rate}</td>`;

    wd.days.forEach((d,di)=>{
      row+=`<td>
        <button class="day-btn" onclick="setDay(${i},${di},'y')">Y</button>
        <button class="day-btn" onclick="setDay(${i},${di},'n')">N</button>
        <button class="day-btn" onclick="setDay(${i},${di},'y/n')">½</button>
      </td>`;
    });

    row+=`
<td>${wd.days.filter(d=>d==='y').length}</td>
<td>${formatMoney(total)}</td>
<td>${formatMoney(wd.arrears)}</td>
<td>${formatMoney(totalDue)}</td>
<td>${wd.paid}</td>
<td>${wd.date||""}</td>
<td>${formatMoney(balance)}</td>
<td class="admin-only"><button onclick="deleteWorker('${w.name}')">X</button></td>
</tr>`;

    (w.type==="Skilled"?skilledTable:casualTable)
    .querySelector("tbody").innerHTML += row;
  });
}

/* PDF WITH HEADER */
async function generatePDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let title = companyTitle.value || "CONSTRUCTIONS";

  doc.setFontSize(18);
  doc.text(title,10,10);

  doc.setFontSize(10);
  doc.text("Project: "+projectTitle.value,10,20);
  doc.text("Venue: "+venue.value,10,25);
  doc.text("Start: "+startDate.value+"  End: "+endDate.value,10,30);

  doc.save("Week_Report.pdf");
}

</script>

</body>
</html>
