<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Manage Labour</title>
    <style>
        body { font-family: Arial; background:#0f172a; color:white; padding:15px; }
        .controls { background: #1e293b; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        table { width:100%; border-collapse: collapse; font-size: 11px; }
        th, td { border: 1px solid #334155; padding: 5px; text-align: center; }
        .day-btn { padding: 2px 4px; cursor: pointer; background: #334155; color: white; border: none; }
        .day-btn.active { background: #22c55e; }
        .day-btn.half { background: #f59e0b; }
        .del-btn { background: #ef4444; color: white; border: none; cursor: pointer; }
        input { width: 60px; background: #1e293b; color: white; border: 1px solid #475569; }
    </style>
</head>
<body>
    <h2>Admin Management</h2>
    
    <div class="controls">
        <input id="name" placeholder="Name">
        <select id="type"><option>Skilled</option><option>Casual</option></select>
        <input id="rate" type="number" placeholder="Rate">
        <input id="week" type="number" value="1" placeholder="Week">
        <button onclick="addWorker()" style="background:#2563eb; color:white;">Add Worker</button>
    </div>

    <table id="adminTable">
        <thead>
            <tr>
                <th>Name</th><th>Rate</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
                <th>Paid</th><th>Arrears</th><th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const API_URL = "YOUR_WEB_APP_URL_HERE";
        let workers = [];

        async function load() {
            const res = await fetch(API_URL);
            workers = await res.json();
            render();
        }

        async function apiPost(data) {
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(data)
            });
            load();
        }

        function render() {
            const tbody = document.querySelector("#adminTable tbody");
            tbody.innerHTML = "";
            workers.forEach((w, idx) => {
                let days = (w.Days || ",,,,,, ").split(",");
                let dayHtml = "";
                for(let i=0; i<7; i++) {
                    let val = days[i] || "";
                    dayHtml += `<td>
                        <button class="day-btn ${val==='y'?'active':''}" onclick="updateDay(${idx},${i},'y')">Y</button>
                        <button class="day-btn ${val==='y/n'?'half':''}" onclick="updateDay(${idx},${i},'y/n')">½</button>
                        <button class="day-btn" onclick="updateDay(${idx},${i},'')">X</button>
                    </td>`;
                }

                tbody.innerHTML += `<tr>
                    <td>${w.Name}</td>
                    <td>${w.Rate}</td>
                    ${dayHtml}
                    <td><input type="number" value="${w.Paid}" onchange="updateMoney(${idx}, 'Paid', this.value)"></td>
                    <td><input type="number" value="${w.Arrears}" onchange="updateMoney(${idx}, 'Arrears', this.value)"></td>
                    <td><button class="del-btn" onclick="deleteWorker('${w.Name}')">Delete</button></td>
                </tr>`;
            });
        }

        function updateDay(idx, dayIdx, val) {
            let w = workers[idx];
            let dArr = (w.Days || ",,,,,,").split(",");
            dArr[dayIdx] = val;
            w.Days = dArr.join(",");
            saveWorker(w);
        }

        function updateMoney(idx, field, val) {
            workers[idx][field] = val;
            saveWorker(workers[idx]);
        }

        function saveWorker(w) {
            apiPost({
                action: "update",
                name: w.Name,
                phone: w.Phone,
                id: w.ID,
                type: w.Type,
                rate: w.Rate,
                week: w.Week || document.getElementById('week').value,
                days: w.Days,
                paid: w.Paid,
                arrears: w.Arrears,
                date: new Date().toLocaleDateString()
            });
        }

        function addWorker() {
            const w = {
                Name: document.getElementById('name').value,
                Type: document.getElementById('type').value,
                Rate: document.getElementById('rate').value,
                Week: document.getElementById('week').value,
                Days: ",,,,,,", Paid: 0, Arrears: 0
            };
            saveWorker(w);
        }

        async function deleteWorker(name) {
            if(confirm("Delete " + name + "?")) {
                apiPost({ action: "delete", name: name });
            }
        }

        window.onload = load;
    </script>
</body>
</html>
