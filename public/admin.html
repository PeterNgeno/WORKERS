<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour Management System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#0b1f3a; color:white; padding:15px; }
h1 { text-align:center; }
.section { margin-top:20px; }

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
  font-size:12px;
}

th, td {
  border:1px solid #fff;
  padding:5px;
  text-align:center;
}

th { background:#1e3a8a; }

input, select {
  padding:5px;
  margin:3px;
  width:110px;
}

button {
  padding:6px;
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
  margin:2px;
}

.header-box {
  background:#1e3a8a;
  padding:10px;
  border-radius:10px;
}

.admin-only { display:none; }
body.admin .admin-only { display:table-cell; }

canvas {
  background:white;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>Labour Management System</h1>

<label>
<input type="checkbox" onchange="toggleAdmin(this.checked)">
 Admin View
</label>

<div class="section header-box">
<h3>Week Control</h3>
<input id="weekNumber" type="number" placeholder="Week (1,2,3...)">
<button onclick="setWeek()">Set Week</button>
<button onclick="generatePDF()">Download Week PDF</button>
<p id="weekDisplay"></p>
</div>

<div class="section">
<h3>Add Worker</h3>

<input id="nameInput" placeholder="Name">
<input id="number" placeholder="Phone">
<input id="idNumber" placeholder="ID">

<select id="type">
<option value="Skilled">Skilled</option>
<option value="Casual">Casual</option>
</select>

<input id="rate" placeholder="Rate">

<button onclick="addWorker()">Add Worker</button>
</div>

<div class="section">
<h3>Summary</h3>
<p id="summary"></p>
</div>

<div class="section">
<h3>Skilled Labourers</h3>
<table id="skilledTable">
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>ID</th>
<th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th><th>Total</th><th>Arrears</th><th>Total Due</th>
<th>Paid</th><th>Date</th><th>Balance</th>
<th class="admin-only">Delete</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="section">
<h3>Casual Labourers</h3>
<table id="casualTable">
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>ID</th>
<th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th><th>Total</th><th>Arrears</th><th>Total Due</th>
<th>Paid</th><th>Date</th><th>Balance</th>
<th class="admin-only">Delete</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwesKptkPVHeFgW1uLPjHkf02o2JIkmTBfq1iBx3mFMXlp13_nOp046olQIScujDBdx/exec";

let workers = [];
let currentWeek = 1;
let isAdmin = false;

function formatMoney(n){
  return "Ksh " + (n || 0).toLocaleString();
}

function normalize(d){
  if(!d) return "";
  d = d.toLowerCase().trim();
  if(d === "y") return "y";
  if(d === "n") return "n";
  if(d === "y/n") return "y/n";
  return "";
}

/* ADMIN */
function toggleAdmin(s){
  if(s){
    let p = prompt("Password:");
    if(p === "@Adminpage1234"){
      document.body.classList.add("admin");
      isAdmin = true;
    } else {
      alert("Wrong password");
      document.querySelector("input[type=checkbox]").checked = false;
    }
  } else {
    document.body.classList.remove("admin");
    isAdmin = false;
  }
  render();
}

/* WEEK */
function setWeek(){
  let w = +weekNumber.value;
  if(!w) return alert("Enter valid week");
  currentWeek = w;
  weekDisplay.innerText = "Current Week: " + w;
  render();
}

/* CALCULATE */
function calculateTotal(w, wd){
  let total = 0;
  wd.days.forEach(d=>{
    d = normalize(d);
    if(d==="y") total += w.rate;
    if(d==="y/n") total += w.rate/2;
  });
  return total;
}

/* LOAD */
async function load(){
  let res = await fetch(API_URL);
  let data = await res.json();

  workers = [];

  data.forEach(r=>{
    let w = workers.find(x=>x.name===r.Name);

    if(!w){
      w = {
        name:r.Name,
        number:r.Phone||"",
        id:r.ID||"",
        type:r.Type||"",
        rate:+r.Rate||0,
        weeks:{}
      };
      workers.push(w);
    }

    w.weeks[r.Week] = {
      days:(r.Days||"").split(","),
      paid:+r.Paid||0,
      arrears:+r.Arrears||0,
      date:r.Date||""
    };
  });

  render();
}
window.onload = load;

/* SAVE */
async function save(w, wd){
  await fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"update",
      name:w.name,
      phone:w.number,
      id:w.id,
      type:w.type,
      rate:w.rate,
      week:currentWeek,
      days:wd.days.join(","),
      paid:wd.paid,
      arrears:wd.arrears,
      date:wd.date||new Date().toISOString().split("T")[0]
    })
  });

  setTimeout(load,500);
}

/* DELETE */
async function deleteWorker(name){
  if(!confirm("Delete "+name+"?")) return;

  await fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"delete",name})
  });

  setTimeout(load,500);
}

/* WEEK DATA */
function getWeekData(w, week){

  if(!w.weeks[week]){

    let prev = w.weeks[week-1];
    let carry = 0;

    if(prev){
      let totalPrev = calculateTotal(w, prev);
      carry = (totalPrev + prev.arrears) - prev.paid;
    }

    w.weeks[week] = {
      days:["","","","","","",""],
      paid:0,
      arrears:carry,
      date:""
    };
  }

  return w.weeks[week];
}

/* ADD */
function addWorker(){
  let name = nameInput.value.trim();
  if(!name) return alert("Name required");

  let exists = workers.find(w=>w.name.toLowerCase()===name.toLowerCase());
  if(exists) return alert("Worker already exists");

  let w={
    name,
    number:number.value,
    id:idNumber.value,
    type:type.value,
    rate:+rate.value,
    weeks:{}
  };

  workers.push(w);
  save(w,getWeekData(w,currentWeek));
}

/* EDIT */
function editField(i, field, val){
  workers[i][field] = field==="rate" ? +val : val;
  save(workers[i], getWeekData(workers[i], currentWeek));
}

/* UPDATE */
function updateDay(i, di, val){
  let wd = getWeekData(workers[i], currentWeek);
  wd.days[di] = val;
  save(workers[i], wd);
}

function updatePaid(i, val){
  let wd = getWeekData(workers[i], currentWeek);
  wd.paid = +val || 0;
  wd.date = new Date().toISOString().split("T")[0];
  save(workers[i], wd);
}

/* RENDER */
function render(){

  let totalPaid=0, totalDue=0;

  skilledTable.querySelector("tbody").innerHTML="";
  casualTable.querySelector("tbody").innerHTML="";

  workers.forEach((w,i)=>{

    let wd = getWeekData(w,currentWeek);

    let total = calculateTotal(w,wd);
    let arrears = wd.arrears||0;
    let totalDueW = total + arrears;
    let balance = totalDueW - wd.paid;

    totalPaid += wd.paid;
    totalDue += totalDueW;

    let days=0;

    let row=`<tr>
<td><input value="${w.name}" onchange="editField(${i},'name',this.value)"></td>
<td><input value="${w.number}" onchange="editField(${i},'number',this.value)"></td>
<td><input value="${w.id}" onchange="editField(${i},'id',this.value)"></td>
<td><input value="${w.rate}" onchange="editField(${i},'rate',this.value)"></td>`;

    wd.days.forEach((d,di)=>{
      d=normalize(d);
      row+=`<td><input value="${d}" onchange="updateDay(${i},${di},this.value)"></td>`;
      if(d==="y") days++;
      if(d==="y/n") days+=0.5;
    });

    row+=`
<td>${days}</td>
<td>${formatMoney(total)}</td>
<td>${formatMoney(arrears)}</td>
<td>${formatMoney(totalDueW)}</td>
<td><input value="${wd.paid}" onchange="updatePaid(${i},this.value)"></td>
<td>${wd.date||""}</td>
<td>${formatMoney(balance)}</td>
<td class="admin-only"><button onclick="deleteWorker('${w.name}')">X</button></td>
</tr>`;

    (w.type==="Skilled"?skilledTable:casualTable)
    .querySelector("tbody").innerHTML += row;
  });

  summary.innerText =
  "Total Due: "+formatMoney(totalDue)+
  " | Paid: "+formatMoney(totalPaid)+
  " | Balance: "+formatMoney(totalDue-totalPaid);
}

/* PDF */
async function generatePDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y=10;

  doc.setFontSize(18);
  doc.text("Labour Report - Week "+currentWeek,10,y);

  y+=10;

  function section(title,type){
    doc.setFontSize(14);
    doc.text(title,10,y);
    y+=6;

    doc.setFontSize(8);

    workers.filter(w=>w.type===type).forEach(w=>{

      let wd = getWeekData(w,currentWeek);
      let total = calculateTotal(w,wd);
      let totalDue = total + wd.arrears;
      let balance = totalDue - wd.paid;

      let txt = `
${w.name} (${w.number})
Rate: ${w.rate}
Days: ${wd.days.join(" ")}
Total: ${total}
Arrears: ${wd.arrears}
Paid: ${wd.paid}
Balance: ${balance}
------------------------`;

      let lines = doc.splitTextToSize(txt,180);
      doc.text(lines,10,y);

      y+=lines.length*5;

      if(y>270){
        doc.addPage();
        y=10;
      }
    });
  }

  section("Skilled Workers","Skilled");
  section("Casual Workers","Casual");

  doc.save("Week_"+currentWeek+"_Report.pdf");
}

</script>

</body>
</html>
