<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour Management System</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><style>
body { font-family: Arial; background:#0b1f3a; color:white; padding:15px; }
h1 { text-align:center; }
.section { margin-top:20px; }

input, select, button {
  padding:6px;
  margin:3px;
}

button {
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
  font-size:12px;
}

th, td {
  border:1px solid #fff;
  padding:5px;
  text-align:center;
}

th { background:#1e3a8a; }

.admin-only { display:none; }
body.admin .admin-only { display:table-cell; }

canvas { background:white; border-radius:10px; margin-top:10px; }

</style></head><body><h1>Labour Management System</h1><div class="section">
<label><input type="checkbox" onclick="openAdmin()"> Admin Page</label>
</div><div class="section">
<h3>Week Control</h3>
<input id="weekNumber" type="number" placeholder="Week (1,2,3...)">
<button onclick="setWeek()">Set Week</button>
<button onclick="exportPDF()">Export Week PDF</button>
<p id="weekDisplay"></p>
</div><div class="section">
<h3>Add / Edit Worker</h3>
<input id="name">
<input id="phone">
<input id="idno">
<select id="type">
<option>Skilled</option>
<option>Casual</option>
</select>
<input id="rate" placeholder="Rate">
<button onclick="addOrUpdate()">Save Worker</button>
</div><div class="section">
<h3>Workers</h3>
<table id="table">
<thead>
<tr>
<th>Name</th><th>Phone</th><th>ID</th><th>Type</th><th>Rate</th>
<th>Days</th><th>Days Count</th><th>Total</th><th>Arrears</th><th>Paid</th><th>Balance</th>
<th class="admin-only">Delete</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div><script>
const API_URL = "https://script.google.com/macros/s/AKfycbwesKptkPVHeFgW1uLPjHkf02o2JIkmTBfq1iBx3mFMXlp13_nOp046olQIScujDBdx/exec";

let workers = [];
let currentWeek = 1;

function openAdmin(){ window.location.href="admin.html"; }

function setWeek(){
  currentWeek = +document.getElementById("weekNumber").value || 1;
  document.getElementById("weekDisplay").innerText = "Week " + currentWeek;
  render();
}

function normalize(w){
  if(!w) return {days:["","","","","","",""],paid:0,arrears:0};
  return w;
}

/* NO DUPLICATES PER WEEK */
function findWorker(name){
  return workers.find(w => w.name.toLowerCase() === name.toLowerCase());
}

function addOrUpdate(){
  let name = document.getElementById("name").value;
  if(!name) return alert("Name required");

  let existing = findWorker(name);

  if(!existing){
    workers.push({
      name,
      phone: phone.value,
      id: idno.value,
      type: type.value,
      rate: +rate.value || 0,
      weeks: {}
    });
  } else {
    existing.phone = phone.value;
    existing.id = idno.value;
    existing.type = type.value;
    existing.rate = +rate.value || 0;
  }

  saveAll();
}

function getWeek(w){
  if(!w.weeks[currentWeek]){
    w.weeks[currentWeek] = {days:["","","","","","",""],paid:0,arrears:0};
  }
  return w.weeks[currentWeek];
}

async function saveAll(){
  await fetch(API_URL,{method:"POST",mode:"no-cors",body:JSON.stringify(workers)});
  setTimeout(load,500);
}

async function load(){
  let res = await fetch(API_URL);
  let data = await res.json();
  workers = data || [];
  render();
}

window.onload = load;

function calc(wd, rate){
  let total=0,days=0;
  wd.days.forEach(d=>{
    if(d=="y"){total+=rate;days++;}
    if(d=="y/n"){total+=rate/2;days+=0.5;}
  });
  return {total,days};
}

function render(){
  let tbody = document.querySelector("tbody");
  tbody.innerHTML="";

  workers.forEach((w,i)=>{
    let wd = normalize(getWeek(w));
    let calcRes = calc(wd,w.rate);

    let balance = (calcRes.total + (wd.arrears||0)) - (wd.paid||0);

    let row=`<tr>
    <td contenteditable onblur="edit(${i},'name',this.innerText)">${w.name}</td>
    <td contenteditable onblur="edit(${i},'phone',this.innerText)">${w.phone||''}</td>
    <td contenteditable onblur="edit(${i},'id',this.innerText)">${w.id||''}</td>
    <td>${w.type}</td>
    <td contenteditable onblur="edit(${i},'rate',this.innerText)">${w.rate}</td>
    <td>${wd.days.join(' ')}</td>
    <td>${calcRes.days}</td>
    <td>${calcRes.total}</td>
    <td contenteditable onblur="editWeek(${i},'arrears',this.innerText)">${wd.arrears||0}</td>
    <td contenteditable onblur="editWeek(${i},'paid',this.innerText)">${wd.paid||0}</td>
    <td>${balance}</td>
    <td class="admin-only"><button onclick="del(${i})">X</button></td>
    </tr>`;

    tbody.innerHTML += row;
  });
}

function edit(i,key,val){ workers[i][key]=val; saveAll(); }
function editWeek(i,key,val){ getWeek(workers[i])[key]=+val||0; saveAll(); }
function del(i){ workers.splice(i,1); saveAll(); }

/* PDF EXPORT MAGAZINE STYLE */
function exportPDF(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  doc.setFontSize(16);
  doc.text("LABOUR WEEK " + currentWeek, 10, 10);

  let y=20;

  workers.forEach(w=>{
    let wd = getWeek(w);
    doc.setFontSize(10);
    doc.text(`${w.name} | ${w.type} | Rate ${w.rate} | Paid ${wd.paid||0} | Arrears ${wd.arrears||0}`,10,y);
    y+=7;
  });

  doc.save("week_"+currentWeek+".pdf");
}

</script></body>
</html>
