<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour Management System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#0b1f3a; color:white; padding:15px; }
h1 { text-align:center; }
.section { margin-top:20px; }
table { width:100%; border-collapse: collapse; margin-top:10px; font-size:12px; }
th, td { border:1px solid #fff; padding:5px; text-align:center; }
th { background:#1e3a8a; }
canvas { background:white; border-radius:10px; margin-top:10px; }
.header-box { background:#1e3a8a; padding:10px; border-radius:10px; }

.admin-only { display:none; }
body.admin .admin-only { display:block; }
</style>
</head>

<body>

<h1>Labour Management System</h1>

<label>
<input type="checkbox" onchange="toggleAdmin(this.checked)">
 Admin Mode
</label>

<div class="section">
<h3>Summary</h3>
<p id="summary">Loading...</p>
</div>

<div class="section">
<h3>Analytics Dashboard</h3>
<canvas id="weeklyChart"></canvas>
<canvas id="attendanceChart"></canvas>
</div>

<div class="section">
<h3>Skilled Labourers</h3>
<table id="skilledTable">
<thead>
<tr>
<th>Name</th><th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th><th>Total</th><th>Arrears</th><th>Total Due</th>
<th>Paid</th><th>Balance</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="section">
<h3>Casual Labourers</h3>
<table id="casualTable">
<thead>
<tr>
<th>Name</th><th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th><th>Total</th><th>Arrears</th><th>Total Due</th>
<th>Paid</th><th>Balance</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwesKptkPVHeFgW1uLPjHkf02o2JIkmTBfq1iBx3mFMXlp13_nOp046olQIScujDBdx/exec";

let workers = [];

/* 🔥 UPDATED ADMIN FUNCTION (LINK ONLY) */
function toggleAdmin(state){
  if(state){
    window.location.href = "admin.html";
  }
}

function formatMoney(n){
  return "Ksh " + (n || 0).toLocaleString();
}

function normalize(d){
  if(!d) return "";
  d = d.toString().toLowerCase().trim();
  if(d==="y") return "y";
  if(d==="n") return "n";
  if(d==="y/n") return "y/n";
  return "";
}

/* 🔥 FIXED LOAD */
async function load(){
  try{
    let res = await fetch(API_URL);
    let text = await res.text();

    console.log("RAW:", text);

    let data = JSON.parse(text);

    workers = [];

    data.forEach(r=>{
      let name = r.Name || r.name || r.NAME;
      if(!name) return;

      workers.push({
        name: name,
        type: r.Type || r.type || "",
        rate: +(r.Rate || r.rate || 0),
        days: (r.Days || r.days || "").split(","),
        paid: +(r.Paid || r.paid || 0),
        arrears: +(r.Arrears || r.arrears || 0)
      });
    });

    console.log("WORKERS:", workers);

    render();

  }catch(e){
    console.error("ERROR:", e);
    alert("Data failed to load. Check console.");
  }
}

window.onload = load;

/* RENDER */
function render(){
  let totalPaid=0,totalDue=0;

  skilledTable.querySelector("tbody").innerHTML="";
  casualTable.querySelector("tbody").innerHTML="";

  workers.forEach(w=>{
    let total=0,days=0;

    let row=`<tr><td>${w.name}</td><td>${formatMoney(w.rate)}</td>`;

    for(let i=0;i<7;i++){
      let d = normalize(w.days[i]);
      row+=`<td>${d}</td>`;

      if(d==="y"){ total+=w.rate; days++; }
      if(d==="y/n"){ total+=w.rate/2; days+=0.5; }
    }

    let totalDueW=total+(w.arrears||0);
    let balance=totalDueW-w.paid;

    totalDue+=totalDueW;
    totalPaid+=w.paid;

    row+=`
    <td>${days}</td>
    <td>${formatMoney(total)}</td>
    <td>${formatMoney(w.arrears)}</td>
    <td>${formatMoney(totalDueW)}</td>
    <td>${formatMoney(w.paid)}</td>
    <td>${formatMoney(balance)}</td>
    </tr>`;

    if((w.type||"").toLowerCase()==="skilled"){
      skilledTable.querySelector("tbody").innerHTML+=row;
    } else {
      casualTable.querySelector("tbody").innerHTML+=row;
    }
  });

  summary.innerText =
    "Total Due: " + formatMoney(totalDue) +
    " | Paid: " + formatMoney(totalPaid) +
    " | Balance: " + formatMoney(totalDue-totalPaid);
}
</script>

</body>
</html>
