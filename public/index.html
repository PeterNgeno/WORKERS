<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour Management System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#0b1f3a; color:white; padding:15px; }
h1 { text-align:center; }
.section { margin-top:20px; }
table { width:100%; border-collapse: collapse; margin-top:10px; font-size:12px; }
th, td { border:1px solid #fff; padding:5px; text-align:center; }
th { background:#1e3a8a; }
canvas { background:white; border-radius:10px; margin-top:10px; }
.header-box { background:#1e3a8a; padding:10px; border-radius:10px; }

.admin-only { display:none; }
body.admin .admin-only { display:block; }
</style>
</head>

<body>

<h1>Labour Management System</h1>

<!-- ✅ ADMIN BUTTON -->
<label>
<input type="checkbox" onchange="toggleAdmin(this.checked)">
 Admin Mode
</label>

<div class="section header-box">
<h3>Week Control</h3>
<p id="weekDisplay">Current Week: 1</p>
</div>

<div class="section">
<h3>Summary</h3>
<p id="summary"></p>
</div>

<!-- ✅ EXPORT SECTION -->
<div class="section admin-only">
<h3>Export & Share</h3>

<input id="workerName" placeholder="Enter Worker Name">
<button onclick="exportSingle()">Export Worker PDF</button>
<button onclick="exportAll('Skilled')">Export Skilled</button>
<button onclick="exportAll('Casual')">Export Casual</button>

</div>

<div class="section">
<h3>Analytics Dashboard</h3>
<canvas id="weeklyChart"></canvas>
<canvas id="attendanceChart"></canvas>
</div>

<div class="section">
<h3>Skilled Labourers</h3>
<table id="skilledTable">
<thead>
<tr>
<th>Name</th>
<th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th><th>Total</th><th>Arrears</th><th>Total Due</th>
<th>Paid</th><th>Date</th><th>Balance</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="section">
<h3>Casual Labourers</h3>
<table id="casualTable">
<thead>
<tr>
<th>Name</th>
<th>Rate</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Days</th><th>Total</th><th>Arrears</th><th>Total Due</th>
<th>Paid</th><th>Date</th><th>Balance</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
const { jsPDF } = window.jspdf;

const API_URL = "https://script.google.com/macros/s/AKfycbwp89tgfnL2PKqyvDwLxWtk3RmhwIdtkFktsDmNXf2hjBrhS8ZsYU-L80yLYal_916Czg/exec";

let workers = [];
let currentWeek = 1;
let attendanceChart = null;
let weeklyChart = null;

/* ADMIN */
function toggleAdmin(state){
  if(state){
    let pass = prompt("Enter Admin Password:");
    if(pass === "@Adminpage1234"){
      document.body.classList.add("admin");
    } else {
      alert("Wrong password");
      document.querySelector("input[type=checkbox]").checked=false;
    }
  } else {
    document.body.classList.remove("admin");
  }
}

function formatMoney(n){
  return "Ksh " + (n || 0).toLocaleString();
}

function normalize(d){
  if(!d) return "";
  d = d.toString().toLowerCase().trim();
  if(d==="y") return "y";
  if(d==="n") return "n";
  if(d==="y/n") return "y/n";
  return "";
}

/* LOAD */
async function load(){
  let res = await fetch(API_URL);
  let data = await res.json();

  workers = [];

  data.forEach(r=>{
    let w = workers.find(x=>x.name===r.Name);
    if(!w){
      w = { name:r.Name, type:r.Type, rate:+r.Rate, weeks:{} };
      workers.push(w);
    }

    w.weeks[r.Week] = {
      days:(r.Days||"").split(","),
      paid:+r.Paid||0,
      arrears:+r.Arrears||0
    };
  });

  render();
}

window.onload = load;

/* RENDER */
function render(){
  let totalPaid=0,totalDue=0;
  let weeklyTotals={}, attendanceData={};

  skilledTable.querySelector("tbody").innerHTML="";
  casualTable.querySelector("tbody").innerHTML="";

  workers.forEach(w=>{
    let wd = w.weeks[currentWeek] || {days:['','','','','','',''],paid:0,arrears:0};

    let total=0,days=0;

    let row=`<tr><td>${w.name}</td><td>${formatMoney(w.rate)}</td>`;

    wd.days.forEach(d=>{
      d=normalize(d);
      row+=`<td>${d}</td>`;
      if(d==="y"){ total+=w.rate; days++; }
      if(d==="y/n"){ total+=w.rate/2; days+=0.5; }
    });

    let totalDueW=total+(wd.arrears||0);
    totalDue+=totalDueW;
    totalPaid+=wd.paid;

    let balance=totalDueW-wd.paid;

    attendanceData[w.name]=days;
    weeklyTotals[currentWeek]=(weeklyTotals[currentWeek]||0)+wd.paid;

    row+=`<td>${days}</td>
    <td>${formatMoney(total)}</td>
    <td>${formatMoney(wd.arrears)}</td>
    <td>${formatMoney(totalDueW)}</td>
    <td>${formatMoney(wd.paid)}</td>
    <td>-</td>
    <td>${formatMoney(balance)}</td></tr>`;

    (w.type==="Skilled"?skilledTable:casualTable).querySelector("tbody").innerHTML+=row;
  });

  summary.innerText=`Total Due: ${formatMoney(totalDue)} | Paid: ${formatMoney(totalPaid)} | Balance: ${formatMoney(totalDue-totalPaid)}`;

  drawCharts(attendanceData, weeklyTotals);
}

/* EXPORT */
function exportSingle(){
  let name = workerName.value.trim().toLowerCase();
  let w = workers.find(x=>x.name.toLowerCase()===name);
  if(!w) return alert("Worker not found");
  exportPDF(w);
}

function exportAll(type){
  workers.filter(w=>w.type===type).forEach(exportPDF);
}

/* PDF */
function exportPDF(w){
  const doc=new jsPDF();

  doc.setFillColor(30,58,138);
  doc.rect(0,0,210,30,"F");

  doc.setTextColor(255,255,255);
  doc.text("LABOUR REPORT",105,15,{align:"center"});

  doc.setTextColor(0,0,0);
  doc.text("Name: "+w.name,10,40);

  let y=50;

  Object.keys(w.weeks).forEach(week=>{
    let wd=w.weeks[week];
    doc.text(`Week ${week} Paid: ${wd.paid}`,10,y);
    y+=10;
  });

  doc.save(w.name+"_report.pdf");
}

/* CHARTS */
function drawCharts(att, weekly){
  if(attendanceChart) attendanceChart.destroy();
  if(weeklyChart) weeklyChart.destroy();

  attendanceChart=new Chart(attendanceChart=document.getElementById("attendanceChart"),{
    type:"bar",
    data:{labels:Object.keys(att),datasets:[{label:"Days",data:Object.values(att)}]}
  });

  weeklyChart=new Chart(weeklyChart=document.getElementById("weeklyChart"),{
    type:"line",
    data:{labels:Object.keys(weekly),datasets:[{label:"Payments",data:Object.values(weekly)}]}
  });
}
</script>

</body>
</html>
